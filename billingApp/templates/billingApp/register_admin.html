    <div class="columns is-centered">
      <div class="card logincard has-text-centered">
        <div class="card-content">
          <div class="content">
            <h1 class="pt-2">Register User</h1>
            <p class="secondary-text">Fill in Information to Create Admin Account</p>
          </div>
          <form method="POST" action="" class="p-2">
            {% csrf_token %}
            <div class="columns">
              <div class="column">
                <div class="field">
                  <div class="control">
                    <input class="input" type="text" name="firstName" placeholder="First Name" required />
                  </div>
                </div>
              </div>
              <div class="column">
                <div class="field">
                  <div class="control">
                    <input class="input" type="text" name="lastName" placeholder="Last Name" required />
                  </div>
                </div>
              </div>
            </div>
            <div class="field">
              <div class="control">
                <input class="input" type="text" name="username" placeholder="Username" required />
              </div>
            </div>
            <div class="field">
              <div class="control">
                <input class="input" type="password" name="password" placeholder="Password" required />
              </div>
            </div>
            <div class="field">
              <div class="control">
                <input class="input" type="password" name="confirm_password" placeholder="Confirm Password" required />
              </div>
            </div>
            <div class="field">
              <div class="control">
                <button class="button sign-up-button is-fullwidth mt-6" type="submit">Sign Up</button>
              </div>
          </form>
        </div>
        <div class="message is-danger">
        {% if messages %}
        <ul class="messages message-header">
          {% for message in messages %}
          <li {% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
          {% endfor %}
        </ul>
        {% endif %}
      </div>
      </div>
    </div>
  </body>
</html>
