{% extends 'billingApp/base.html' %} {% load static %} {% block content %}

</div>

<div class="card card2">
  <div class="card-content">
    <h1 class="is-size-3 has-text-weight-bold">Add Tenant</h1>
    <form method="POST" action="{% url 'add_tenant' %}">
      {% csrf_token %}
      <div class="columns is-justify-content-center p-5 is-variable is-6">
        <div class="column is-5">
          <label for="contactPerson">Name of Contact Person *</label>
          <input type="text" class="input" id="contactPerson" name="contactPerson" pattern="[a-zA-Z\s]+" placeholder="Full Name" required />
        </div>
        <div class="column is-5">
          <label for="phoneNumber">Phone Number *</label>
          <input type="tel" class="input" id="phoneNumber" name="phoneNumber" pattern="09[0-9]{2} [0-9]{3} [0-9]{4}" placeholder="09xx xxx xxxx" required />
        </div>
      </div>
      <div class="columns is-justify-content-center p-5 is-variable is-6">
        <div class="column is-5">
          <label for="email">Email *</label>
          <input type="email" class="input" id="email" name="email" maxlength="50" placeholder="Email Address" required />
        </div>
        <div class="column is-5">
          <label for="companyName">Company Name</label>
          <input
            type="text"
            class="input"
            id="companyName"
            name="companyName"
            placeholder="Ex. Jollibee Foods Corporation"
            pattern="[a-zA-Z0-9]+"
            maxlength="30"
          />
        </div>
      </div>
      <div class="columns is-justify-content-center p-4 is-variable">
        <div class="column is-1 has-text-centered">
          <button type="submit" class="button is-primary">Submit</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="message is-danger">
  {% if messages %}
  <ul class="messages message-header">
    {% for message in messages %}
    <li {% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}
</div>

{% endblock %}
